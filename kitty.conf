shell /usr/bin/fish

font family Agave Nerd Font Mono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size        16.0
adjust_line_height  110%
adjust_column_width 100%

# === Window layout ===
window_padding_width  8
window_margin_width   0
window_border_width   1.0
hide_window_decorations no

# === Cursor ===
cursor_shape beam
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 0
cursor_blink_interval 0.5

# === Tabs ===
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{title}"
active_tab_font_style bold
inactive_tab_font_style normal

#background_opacity           0.90
#enable_background_blur yes
#background_blur		     	 64
#dynamic_background_opacity yes

#background_image /home/finradon/Pictures/Wallpapers/blur2.jpg
#background_image_layout cscaled
#background_tint 0.3
# === Scrollback ===
scrollback_lines 10000
scrollback_pager less

# === Keyboard shortcuts ===
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+t new_tab
map ctrl+w close_tab

include ./gruvbox_dark.conf


# BEGIN_KITTY_FONTS
font_family      family="MesloLGM Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
